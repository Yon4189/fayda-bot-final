version: '3.8'

services:
  bot:
    build: .
    container_name: fayda-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - CAPTCHA_KEY=${CAPTCHA_KEY}
      - MONGODB_URI=mongodb://mongodb:27017/fayda_bot
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}
      - PORT=3000
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bot-network

  mongodb:
    image: mongo:latest
    container_name: mongodb-local
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - bot-network
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest
    container_name: redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  mongodb_data:
